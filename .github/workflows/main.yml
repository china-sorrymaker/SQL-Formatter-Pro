name: Million-App-Base-AutoBuilder

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 关键点 1：从 Secrets 还原 JKS 文件到根目录
      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release-key.jks

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      # 关键点 2：赋予执行权限，解决 No such file or directory 报错
      - name: Make Gradlew Executable
        run: chmod +x gradlew

      # 关键点 3：带上 3 个密码变量执行打包
      - name: Build Android App
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # 关键点 4：把打好的包传到 GitHub Actions 页面供下载
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SQL-Formatter-Pro-Package
          path: app/build/outputs/apk/release/*.apk
