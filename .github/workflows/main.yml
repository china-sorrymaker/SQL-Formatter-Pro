name: Million-App-Base-AutoBuilder

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 1. 还原 JKS 锁（从你的那串 MIIKs... 变回文件）
      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release-key.jks

      # 2. 核心步骤：让 GitHub 现场给你装一个 Gradle 8.7 工具
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      # 3. 关键：直接用系统命令 'gradle'，不再去找你项目里的 'gradlew' 脚本
      - name: Build Android App
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      # 4. 把打好的包吐出来
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SQL-Formatter-Pro-APK
          path: app/build/outputs/apk/release/*.apk
